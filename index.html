<!DOCTYPE html>
<html>
<head>
  <title>Past Papers Hub</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f3f7f4;
    }

    /* HEADER */
    .header {
      background: #3f7d5a;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-icon {
      font-size: 26px;
      cursor: pointer;
    }

    /* SIDE MENU */
    .side-menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100%;
      background: #3f7d5a;
      padding-top: 60px;
      transition: 0.3s;
    }

    .side-menu a {
      display: block;
      padding: 15px;
      color: white;
      text-decoration: none;
    }

    .side-menu a:hover {
      background: #2f5e43;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      color: #2f5e43;
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #555;
      font-size: 18px;
    }

    /* CARDS */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 40px;
      gap: 20px;
    }

    .card {
      background: white;
      width: 200px;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card h3 {
      color: #3f7d5a;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #3f7d5a;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .btn:hover {
      background: #2f5e43;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div>📚 Past Papers Hub</div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </div>

  <!-- SIDE MENU -->
  <div id="menu" class="side-menu">
    <a href="index.html">Home</a>
    <a href="subjects.html">Subjects</a>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Study Smarter</h1>
    <p>Past papers, revision tools, and exam prep in one place</p>
  </div>

  <!-- FEATURE CARDS -->
  <div class="cards">
    <div class="card">
      <h3>📘 Subjects</h3>
      <p>Browse all subjects</p>
      <a class="btn" href="subjects.html">Open</a>
    </div>

    <div class="card">
      <h3>📄 Past Papers</h3>
      <p>Coming soon</p>
    </div>

    <div class="card">
      <h3>🤖 AI Solver</h3>
      <p>Coming soon</p>
    </div>
  </div>

  <script>
    function toggleMenu() {
      var menu = document.getElementById("menu");

      if (menu.style.left === "0px") {
        menu.style.left = "-260px";
      } else {
        menu.style.left = "0px";
      }
    }
  </script>

</body>
</html>
